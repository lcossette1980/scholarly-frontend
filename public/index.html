<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- Favicon: SVG for modern browsers, ICO for legacy, PNG for high-DPI -->
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <link rel="mask-icon" href="%PUBLIC_URL%/favicon.svg" color="#312e81" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#312e81" />
    <meta name="msapplication-TileColor" content="#312e81" />
    <meta http-equiv="Content-Security-Policy" content="font-src 'self' data: https:; img-src 'self' data: https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; connect-src 'self' https: wss:; default-src 'self' https:;" />

    <!-- Inter typeface (Linear/Vercel style) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- Primary Meta Tags -->
    <meta
      name="description"
      content="DraftEngine turns the PDFs, URLs, DOIs, and RSS feeds you already collected into research-grade drafts. Citations stay tied to the sources you uploaded. Five voices for different document types. Free to start with 5 sources."
    />
    <meta name="author" content="DraftEngine" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.draftengineapp.com/" />

   <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.draftengineapp.com/" />
    <meta property="og:site_name" content="DraftEngine" />
    <meta property="og:title" content="DraftEngine — Research-grade drafts from the sources you uploaded" />
    <meta property="og:description" content="Drop in PDFs, URLs, DOIs, or RSS feeds. Get extracted arguments, page-numbered quotes, outlines, and fully cited drafts in five voices. Free for your first 5 sources." />
    <meta property="og:image" content="https://www.draftengineapp.com/og-image.jpg?v=2" />
    <meta property="og:image:secure_url" content="https://www.draftengineapp.com/og-image.jpg?v=2" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="DraftEngine — Research-grade drafts from the sources you uploaded. Free to start." />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://www.draftengineapp.com/" />
    <meta name="twitter:site" content="@draftengine" />
    <meta name="twitter:creator" content="@draftengine" />
    <meta name="twitter:title" content="DraftEngine — Research-grade drafts from the sources you uploaded" />
    <meta name="twitter:description" content="Drop in PDFs, URLs, DOIs, or RSS feeds. Get extracted arguments, page-numbered quotes, outlines, and fully cited drafts in five voices. Free for your first 5 sources." />
    <meta name="twitter:image" content="https://www.draftengineapp.com/og-image.jpg?v=2" />
    <meta name="twitter:image:alt" content="DraftEngine — Research-grade drafts from the sources you uploaded." />

    <!-- Additional SEO Meta Tags -->
    <meta name="application-name" content="DraftEngine" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="DraftEngine" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Schema.org Structured Data - Product/Software -->
    <!-- NOTE: aggregateRating intentionally omitted until we have real verifiable
         reviews. Schema.org review markup with fabricated counts is grounds for
         a Google manual action and an FTC violation. Add it back ONLY when we
         have actual user ratings sourced from a real review surface. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "DraftEngine",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": [
        {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD",
          "name": "Starter Plan",
          "description": "5 source entries, no credit card required",
          "priceValidUntil": "2026-12-31"
        },
        {
          "@type": "Offer",
          "price": "9.99",
          "priceCurrency": "USD",
          "name": "Plus Plan",
          "description": "Unlimited source entries + Topic & Outline Generator + content generation (pay-per-use)",
          "billingPeriod": "Monthly",
          "priceValidUntil": "2026-12-31"
        },
        {
          "@type": "Offer",
          "price": "19.99",
          "priceCurrency": "USD",
          "name": "Pro Plan",
          "description": "All Plus features + Research Feeds + included monthly pages",
          "billingPeriod": "Monthly",
          "priceValidUntil": "2026-12-31"
        }
      ],
      "description": "DraftEngine turns the PDFs, URLs, DOIs, and RSS feeds you collected into research-grade drafts. Citations stay tied to the sources you uploaded. Five voices for different document types.",
      "url": "https://www.draftengineapp.com",
      "author": {
        "@type": "Organization",
        "name": "DraftEngine"
      },
      "featureList": [
        "Import sources from PDF, URL, DOI, and RSS",
        "Extract key arguments, angles, and page-numbered quotes",
        "Generate topics and outlines from selected sources",
        "Draft complete documents with traceable citations",
        "Voice profiles: editorial, business, academic, scientific, reference",
        "APA, MLA, and Chicago citation styles",
        "Research Feeds for ongoing topic monitoring",
        "Export to Word, PDF, and plain text"
      ]
    }
    </script>

    <!-- Schema.org Structured Data - FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How does DraftEngine work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You import sources (PDFs, URLs, DOIs, or RSS feeds). DraftEngine extracts the key arguments, surprising angles, and quotable passages with page numbers. From there you can generate topic suggestions, outlines, and fully cited drafts that only reference the sources you uploaded."
          }
        },
        {
          "@type": "Question",
          "name": "Is DraftEngine free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Your first 5 source entries are free with no credit card. Plus ($9.99/month) adds unlimited sources plus the Topic and Outline Generator. Pro ($19.99/month) adds Research Feeds and included monthly content generation pages."
          }
        },
        {
          "@type": "Question",
          "name": "What citation styles does DraftEngine support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "APA, MLA, and Chicago. You pick the style when you generate content; all references format automatically."
          }
        },
        {
          "@type": "Question",
          "name": "Can DraftEngine write complete documents?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Build a source library, pick a topic, generate an outline, and DraftEngine drafts the full document. It supports articles, essays, white papers, business memos, academic papers, scientific writeups, and bibliographies, each in a voice profile tuned to that format."
          }
        },
        {
          "@type": "Question",
          "name": "Where do the citations come from?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Only from the sources you uploaded. DraftEngine does not invent citations. Every reference traces back to a document in your library, and quoted passages include page numbers when available."
          }
        },
        {
          "@type": "Question",
          "name": "Can I export my work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Source summaries, outlines, and drafts export to Microsoft Word (.docx), PDF, or plain text."
          }
        }
      ]
    }
    </script>

    <!-- Schema.org Structured Data - Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "DraftEngine",
      "url": "https://www.draftengineapp.com",
      "logo": "https://www.draftengineapp.com/logo.png",
      "description": "AI-powered writing assistant for professionals and creators",
      "sameAs": [
        "https://twitter.com/draftengine"
      ]
    }
    </script>
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.
    -->
    <!-- Per-page <title> and meta are set by react-helmet-async via the SEO
         component (src/components/SEO.js). This default title is what social
         crawlers see when they hit the SPA shell directly. -->
    <title>DraftEngine — Research-grade drafts from the sources you uploaded</title>
  </head>

    <div id="root"></div>

</html>
